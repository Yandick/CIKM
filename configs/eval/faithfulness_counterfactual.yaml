name: faithfulness_counterfactual_eval
task: candidate_reranking

inputs:
  data_config: configs/data/amazon_food_pilot.yaml
  prompt_config: configs/prompt/evidence_rerank_v1.yaml

splits:
  validation_examples: 500
  test_examples: 500

baselines:
  - retriever_prior_only
  - direct_llm_rerank
  - free_form_cot_rerank
  - evidence_prompt_rerank
  - evidence_sft
  - rank_only_grpo
  - faithfulness_grpo

metrics:
  ranking:
    - hr@1
    - hr@5
    - ndcg@3
    - ndcg@5
    - mrr
  format:
    - parse_success_rate
    - candidate_only_rate
    - complete_ranking_rate
    - selected_is_top_rate
    - evidence_ref_validity
  faithfulness:
    - evidence_precision
    - targeted_evidence_sensitivity
    - irrelevant_evidence_stability
    - sufficiency
    - comprehensiveness
  efficiency:
    - input_tokens
    - completion_tokens
    - latency_ms
    - num_model_calls

counterfactual_audits:
  targeted_drop:
    enabled: true
    remove_refs_from_model_output: true
    history_refs_only: true
  irrelevant_drop:
    enabled: true
    remove_uncited_history_refs: true
    max_removed: 3
  sufficiency:
    enabled: true
    keep_only_cited_history_refs: true
  comprehensiveness:
    enabled: true
    remove_all_cited_history_refs: true

failure_taxonomy:
  - invalid_json
  - candidate_not_in_pool
  - missing_candidate_in_ranking
  - invented_evidence_ref
  - unsupported_evidence_claim
  - unstable_under_irrelevant_drop
  - insensitive_to_cited_evidence_drop
  - overlong_reasoning

notes:
  - Report audit model-call cost separately from normal reranking cost.
  - Free-form CoT may not expose evidence refs; evaluate it with extracted refs and mark extraction failures.
