name: qwen2.5-3b-instruct-local
backend: huggingface_local_causal_lm
model_path: CHANGE_ME_TO_LOCAL_HF_MODEL_DIR
local_files_only: true
trust_remote_code: false
device_map: auto
torch_dtype: auto

runtime:
  use_chat_template: true
  max_input_tokens: 4096
  batch_size: 1

generation:
  max_new_tokens: 96
  do_sample: false
  temperature: 0.0
  top_p: 1.0
  repetition_penalty: 1.0

notes:
  - This repo assumes the model is already downloaded locally in Hugging Face format.
  - Start with the same backbone for answer-only and free-form CoT.
  - Keep decoding identical across prompt styles for fair baseline comparison.
