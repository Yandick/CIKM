name: trace_rec_v1_minimal

schema:
  graph_metadata:
    - task
    - user_id
    - candidate_ids
  nodes:
    - preference_state
    - candidate_evidence
    - decision
  edges:
    - supports
    - conflicts
    - selected
  node_attributes:
    preference_state:
      - polarity
      - horizon
      - evidence_refs
      - summary
      - source
    candidate_evidence:
      - candidate_id
      - feature_refs
      - summary
    decision:
      - selected_item_id

constraints:
  candidate_conditioned: true
  require_evidence_grounding: true
  max_preference_state_nodes: 3
  max_candidate_evidence_nodes: 5
  max_signed_edges_per_candidate_evidence: 2
  exact_selected_edges: 1
  strict_single_pointer_mode: true

notes:
  - V1 is intentionally minimal.
  - Treat short-term vs long-term as preference-state horizon attributes, not separate node types.
  - Treat aversion as negative polarity, not a standalone node type.
  - Treat goal as graph-level task metadata, not a node.
  - When available, pass evidence and feature registries through metadata.context so refs can be validated against real inputs.
  - Use a compact eval view for counterfactual scoring across TRACE-Rec and free-form CoT.
