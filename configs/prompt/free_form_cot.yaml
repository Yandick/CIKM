name: free_form_cot_v1

task:
  type: next_item_recommendation
  output: top1_from_candidate_set

instructions:
  - Analyze the user's chronological history before deciding.
  - Compare the candidates against the user's likely recent and persistent preferences.
  - Give a short free-form rationale before the final choice.
  - End with the selected candidate id.

constraints:
  candidate_conditioned: true
  require_history_grounding: true
  keep_rationale_concise: true
