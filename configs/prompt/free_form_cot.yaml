name: free_form_cot_v1
style: free_form_cot
system_prompt: >
  You are a recommendation assistant. Use the user's recent history and the
  candidate item information to pick the best next item.
task_block: |
  Task:
  First give a short analysis of the user's likely recent and persistent preferences,
  and compare the candidates against them.
  Then end with a final line in the exact format: Answer: <candidate_id>.
