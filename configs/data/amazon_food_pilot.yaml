name: amazon_food_pilot
dataset_family: amazon_reviews_2023
task: candidate_reranking

paths:
  raw_dir: data/raw/amazon-food
  train_file: Grocery_and_Gourmet_Food.train.csv
  validation_file: Grocery_and_Gourmet_Food.valid.csv
  test_file: Grocery_and_Gourmet_Food.test.csv
  metadata_file: meta_Grocery_and_Gourmet_Food.jsonl
  review_file: null
  processed_dir: data/processed/amazon-food-pilot

columns:
  user_id: user_id
  item_id: parent_asin
  rating: rating
  timestamp: timestamp
  history: history

pilot:
  train_examples: 2000
  validation_examples: 500
  test_examples: 500
  seed: 42
  deterministic_order: true

sequence:
  min_history_len: 5
  max_history_len: 30
  keep_positive_target_only: true
  positive_rating_threshold: 4.0
  history_separator: " "

metadata:
  enabled: true
  scan_metadata_jsonl_for_sampled_items_only: true
  fields:
    - title
    - store
    - categories
    - features
    - description
    - details
    - average_rating
    - rating_number
    - price
  max_features: 5
  max_description_chars: 280
  max_detail_pairs: 8
  fallback_title: "Unknown item"

candidates:
  num_candidates: 20
  policy: random_negative
  policies:
    random_negative:
      enabled: true
      exclude_history: true
      exclude_target: true
      item_pool_source: train_file
    popularity_negative:
      enabled: true
      popularity_source: train_file
      exclude_history: true
      exclude_target: true
      popularity_pool_size: 5000
    retriever_hard_negative:
      enabled: false
      retriever_name: sasrec
      retriever_scores_required: false
  shuffle_candidates: true
  candidate_id_style: letters

leakage_control:
  target_item_not_in_prompt_as_label: true
  no_ground_truth_marker: true
  no_future_interactions_in_history: true

notes:
  - Use CSV splits as the primary interaction source.
  - Do not use the 5.9GB review JSONL in the first pilot.
  - Metadata JSONL is scanned only to index ASINs appearing in the sampled pilot.
  - Popularity negatives are for pipeline validation; retriever hard negatives are required for main claims.
