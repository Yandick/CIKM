experiment_name: sft_structured_reasoning

stages:
  - name: semantic_alignment
    enabled: true
  - name: rationale_sft
    enabled: true
  - name: rl_or_rft
    enabled: false
  - name: reasoning_internalization
    enabled: false

losses:
  recommendation_loss_weight: 1.0
  rationale_loss_weight: 0.5
  structure_constraint_weight: 0.2
  length_penalty_weight: 0.0

training:
  seed: 42
  epochs: 3
  learning_rate: 2.0e-5
  gradient_accumulation_steps: 4

notes:
  - Start with SFT only.
  - Enable RL or internalization only after the rationale schema is stable.
